version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: yieldiq_db
    environment:
      POSTGRES_DB: yieldiq
      POSTGRES_USER: yieldiq_user
      POSTGRES_PASSWORD: yieldiq_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yieldiq_user -d yieldiq"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yieldiq_backend
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: yieldiq
      POSTGRES_USER: yieldiq_user
      POSTGRES_PASSWORD: yieldiq_pass
      SECRET_KEY: "09d25e094faa6ca2556c818166b7a9563b93f7099f6f0f4caa6cf63b88e8d3e7"
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yieldiq_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api/v1
    restart: unless-stopped

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yieldiq_seed
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: yieldiq
      POSTGRES_USER: yieldiq_user
      POSTGRES_PASSWORD: yieldiq_pass
    depends_on:
      db:
        condition: service_healthy
    command: python -m etl.seed_data
    profiles:
      - seed

volumes:
  postgres_data:
    driver: local
